# Saarthi Mental Health Chatbot Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api
spring.application.name=saarthi-chatbot

# Logging Configuration
logging.level.root=INFO
logging.level.com.saarthi.chatbot=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Ollama API Configuration
# Ollama runs locally, make sure to have it installed and running before starting the backend
# Download from: https://ollama.ai
# Start Ollama with: ollama serve
# Pull a model with: ollama pull neural-chat (or mistral, llama2, etc.)
#
# Configuration options:
ollama.base-url=http://localhost:11434
ollama.model=neural-chat
ollama.temperature=0.7
ollama.top-p=0.9
ollama.top-k=40

# Chatbot Configuration
chatbot.max-conversation-history=10
chatbot.session-timeout-minutes=30
chatbot.response-validation.enabled=true

# CORS Configuration
cors.allowed-origins=http://localhost:4321,http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null