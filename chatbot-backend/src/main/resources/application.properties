# Saarthi Mental Health Chatbot Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api
spring.application.name=saarthi-chatbot

# Logging Configuration
logging.level.root=INFO
logging.level.com.saarthi.chatbot=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# OpenAI API Configuration (DEPRECATED - Using Ollama)
# Set these via environment variables for security:
# Now using Ollama - completely free, runs locally, no API key needed!
ollama.api.url=http://localhost:11434/api/chat
ollama.model=mistral
ollama.temperature=0.7

# Note: Ollama must be running locally
# Install from: https://ollama.ai
# Run: ollama run llama2
# Or any other model: ollama run mistral, ollama run neural-chat, etc.

# Chatbot Configuration
chatbot.max-conversation-history=10
chatbot.session-timeout-minutes=30
chatbot.response-validation.enabled=true

# CORS Configuration
cors.allowed-origins=http://localhost:4321,http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
