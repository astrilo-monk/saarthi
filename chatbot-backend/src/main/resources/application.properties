# Saarthi Mental Health Chatbot Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api
spring.application.name=saarthi-chatbot

# Logging Configuration
logging.level.root=INFO
logging.level.com.saarthi.chatbot=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# OpenAI API Configuration
# REQUIRED: Set this environment variable before running:
# Windows (PowerShell): $env:OPENAI_API_KEY = "sk-proj-your-actual-key"
# Windows (CMD): set OPENAI_API_KEY=sk-proj-your-actual-key
# Mac/Linux: export OPENAI_API_KEY=sk-proj-your-actual-key
#
# Get your key from: https://platform.openai.com/api-keys
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.temperature=0.7
openai.max-tokens=150

# Chatbot Configuration
chatbot.max-conversation-history=10
chatbot.session-timeout-minutes=30
chatbot.response-validation.enabled=true

# CORS Configuration
cors.allowed-origins=http://localhost:4321,http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
